tr:hover{background:var(--row-hover)!important}
input::placeholder{color:#8A9E8A}

.stat .sub{font-size:11px;color:var(--muted);margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.grid-sm{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.region-card{background:var(--bg);border-radius:8px;padding:12px 14px;cursor:pointer;border-left-width:3px;border-left-style:solid;transition:all 0.2s;border:1px solid var(--border)}
.region-card:hover{box-shadow:0 2px 8px rgba(20,82,42,0.1)}
.tab-bar{display:flex;gap:2px;margin-bottom:22px;background:var(--card);border-radius:8px;padding:3px;width:fit-content;border:1px solid var(--border)}
.tab-btn{padding:7px 22px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.tab-btn.active{background:var(--accent);color:#fff}.tab-btn:not(.active){background:transparent;color:var(--muted)}.tab-btn:not(.active):hover{background:#EDF5ED}
.filter-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}.filter-btn:hover{background:#EDF5ED}
.search-input{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:11px;font-family:'JetBrains Mono',monospace;width:190px;outline:none}.search-input:focus{border-color:var(--accent)}
.sev-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.wo-badge{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;gap:4px}
.wo-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.bar-track{height:7px;background:#E8EDE5;border-radius:3px;overflow:hidden}.bar-fill{height:100%;border-radius:3px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.header-bar{background:var(--green-dark);color:#fff;margin:-22px -26px 22px;padding:18px 26px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.header-bar h1{font-size:24px;font-weight:800;font-family:'Space Grotesk',sans-serif;letter-spacing:-0.5px;color:#fff}
.header-bar .sub{font-size:12px;color:#B8D4B0;margin-top:3px}.header-bar .date{font-size:11px;color:#B8D4B0;text-align:right;font-family:'JetBrains Mono',monospace}.header-bar .date strong{color:#fff;display:block;font-weight:600}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px rgba(212,160,23,0.7);animation:pulse 2s infinite;display:inline-block}
.accent-stripe{height:4px;background:linear-gradient(90deg,var(--green-dark),var(--green-mid),var(--yellow));margin:-22px -26px 22px}
.accordion{border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;background:var(--card)}
.accordion-head{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s;user-select:none}
.accordion-head:hover{background:#EDF5ED}
.accordion-arrow{transition:transform 0.2s;font-size:12px;color:var(--muted)}
.accordion-arrow.open{transform:rotate(180deg)}
.accordion-body{border-top:1px solid var(--border);padding:0}
.store-row{padding:10px 16px 10px 32px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #E8EDE5;transition:background 0.15s}
.store-row:last-child{border-bottom:none}
.store-row:hover{background:#EDF5ED}
.store-assets{background:var(--bg);padding:0 16px 0 32px;border-top:1px solid #E8EDE5}
</style>

const RC={"Region 01":"#1B6B2A","Region 02":"#2D8B3E","Region 03":"#D4A017","Region 04":"#3A9E50","Region 05":"#8B6914","Region 06":"#14522A","Region 07":"#6B8E23","Region 08":"#228B22",Distribution:"#5C715C",Headquarters:"#4A7C59",Millwork:"#B8860B"};
const CC={Truck:"#1B6B2A",Trailer:"#D4A017",TMFL:"#14522A","LD Vehicle":"#6B8E23",Forklift:"#B8860B"};
const SEV=d=>{if(d>90)return{l:"Critical",c:"#B91C1C",bg:"rgba(185,28,28,0.10)"};if(d>60)return{l:"High",c:"#C2410C",bg:"rgba(194,65,12,0.08)"};if(d>30)return{l:"Medium",c:"#B45309",bg:"rgba(180,83,9,0.08)"};return{l:"Low",c:"#1B6B2A",bg:"rgba(27,107,42,0.08)"}};
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};

let state={tab:"summary",sortCol:"overdue",sortDir:"desc",search:"",openRegions:{},openStores:{}};

function sortRegions(list){return list.sort((a,b)=>REGION_ORDER.indexOf(a.name)-REGION_ORDER.indexOf(b.name))}
function calcGroup(items){items.sort((a,b)=>b.overdue-a.overdue);const avg=Math.round(items.reduce((s,r)=>s+r.overdue,0)/items.length);return{items,count:items.length,avg,crit:items.filter(r=>r.overdue>90).length,noWO:items.filter(r=>!r.hasOpenWO).length,worst:items[0]?.overdue||0}}
function getRegions(){const m={};DATA.forEach(r=>{if(!m[r.region])m[r.region]=[];m[r.region].push(r)});return sortRegions(Object.entries(m).map(([n,i])=>({name:n,...calcGroup([...i])})))}
function getStoresForRegion(rn){const m={};DATA.filter(r=>r.region===rn).forEach(r=>{if(!m[r.store])m[r.store]=[];m[r.store].push(r)});return Object.entries(m).map(([n,i])=>({name:n,...calcGroup([...i])})).sort((a,b)=>b.avg-a.avg)}

function statHTML(l,v,sub,ac,ic){return`<div class="stat"><div class="icon" style="color:${ac}">${esc(ic)}</div><div class="label">${esc(l)}</div><div class="value" style="color:${ac}">${esc(String(v))}</div>${sub?`<div class="sub">${esc(sub)}</div>`:''}</div>`}
function sevBadge(d){const s=SEV(d);return`<span class="sev-badge" style="color:${s.c};background:${s.bg};border:1px solid ${s.c}22">${s.l}</span>`}
function woBadge(r){return r.hasOpenWO?`<span class="wo-badge" style="color:#1B6B2A"><span class="wo-dot" style="background:#1B6B2A"></span>${r.openWO}</span>`:`<span class="wo-badge" style="color:#B91C1C"><span class="wo-dot" style="background:#B91C1C"></span>NO WO</span>`}
function miniBar(items){return`<div style="display:flex;gap:1px;align-items:flex-end;height:28px">${items.map(it=>{const hh=Math.max(3,(it.overdue/MAXOV)*26);const s=SEV(it.overdue);return`<div title="${it.asset}: ${it.overdue}d" style="width:5px;height:${hh}px;background:${s.c};border-radius:1.5px;opacity:0.75"></div>`}).join('')}</div>`}
function dot(color,sz=7){return`<span style="width:${sz}px;height:${sz}px;border-radius:2px;background:${color};display:inline-block"></span>`}

function filterData(){let d=DATA;if(state.search)d=d.filter(r=>r.asset.includes(state.search)||r.store.toLowerCase().includes(state.search.toLowerCase()));return[...d].sort((a,b)=>{const av=a[state.sortCol],bv=b[state.sortCol];if(typeof av==="string")return state.sortDir==="desc"?bv.localeCompare(av):av.localeCompare(bv);return state.sortDir==="desc"?bv-av:av-bv})}

function thH(l,col,w,sortable=true){const ac=state.sortCol===col;const ar=ac?(state.sortDir==="desc"?" ↓":" ↑"):"";return`<th class="${sortable?'sortable':''} ${ac?'active':''}" style="width:${w}px" ${sortable?`onclick="handleSort('${col}')"`:''}>${esc(l)}${ar}</th>`}

function assetTableHTML(data){
  let hd=thH("Asset","asset",80)+thH("Class","cls",80)+thH("Type","type",130)+thH("Store","store",150)+thH("Last WO","lastWO",75)+thH("Last PM","lastDate",85)+thH("Days Since","daysSince",75)+`<th style="width:55px">INTV</th>`+thH("Overdue","overdue",75)+`<th style="width:75px">SEV</th><th style="width:90px">OPEN WO</th><th style="width:90px">SPAN</th>`;
  const rows=data.map((r,i)=>{const s=SEV(r.overdue);const bw=Math.max(3,(r.overdue/MAXOV)*100);
  return`<tr style="background:${i%2===0?'transparent':'#F9FAF7'}"><td class="mono" style="font-weight:600;font-size:12px">${esc(r.asset)}</td><td><span style="display:inline-flex;align-items:center;gap:4px">${dot(CC[r.cls]||'#666',6)} ${esc(r.cls)}</span></td><td style="color:var(--muted)">${esc(r.type)}</td><td>${esc(r.store)}</td><td class="mono" style="color:var(--muted)">${r.lastWO}</td><td class="mono">${esc(r.lastDate)}</td><td class="mono">${r.daysSince}</td><td class="mono" style="color:var(--muted)">${r.interval}d</td><td class="mono" style="font-weight:700;color:${s.c}">${r.overdue}</td><td>${sevBadge(r.overdue)}</td><td>${woBadge(r)}</td><td><div class="bar-track"><div class="bar-fill" style="width:${bw}%;background:${s.c}"></div></div></td></tr>`}).join('');
  return`<div style="overflow-x:auto"><table><thead><tr>${hd}</tr></thead><tbody>${rows}</tbody></table></div>`}

function renderSummary(){
  const crit=DATA.filter(r=>r.overdue>90).length;const noWO=DATA.filter(r=>!r.hasOpenWO).length;const avg=Math.round(DATA.reduce((s,r)=>s+r.overdue,0)/DATA.length);
  const sevB={Critical:0,High:0,Medium:0,Low:0};DATA.forEach(r=>{sevB[SEV(r.overdue).l]++});const regions=getRegions();
  let o=`<div class="kpi-strip">${statHTML("Total Overdue",DATA.length,`${(DATA.length/TOTAL_FLEET*100).toFixed(1)}% of fleet`,"#1B6B2A","Σ")}${statHTML("Critical (>90d)",crit,`${Math.round(crit/DATA.length*100)}% of overdue`,"#B91C1C","!")}${statHTML("No Open WO",noWO,"Needs WO created","#D4A017","⚠")}${statHTML("Avg Days Overdue",avg,`Worst: ${MAXOV} days`,"#C2410C","μ")}</div>`;
  const sc=[{l:"Critical",c:"#B91C1C"},{l:"High",c:"#C2410C"},{l:"Medium",c:"#B45309"},{l:"Low",c:"#1B6B2A"}];
  let sb=sc.map(s=>{const p=(sevB[s.l]/DATA.length)*100;return p>0?`<div style="width:${p}%;background:${s.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace" title="${s.l}: ${sevB[s.l]}">${p>8?sevB[s.l]:''}</div>`:''}).join('');
  let sl=sc.map(s=>`<span style="font-size:10px;color:var(--muted);display:inline-flex;align-items:center;gap:4px">${dot(s.c,8)} ${s.l}: ${sevB[s.l]}</span>`).join('');
  o+=`<div class="card"><div class="grotesk" style="font-size:12px;font-weight:700;margin-bottom:12px">Severity Distribution</div><div style="display:flex;border-radius:6px;overflow:hidden;height:28px">${sb}</div><div style="display:flex;gap:16px;margin-top:8px">${sl}</div></div>`;
  const cls=["Truck","Trailer","TMFL","LD Vehicle","Forklift"];
  let cc=cls.map(c=>{const it=DATA.filter(r=>r.cls===c).sort((a,b)=>b.overdue-a.overdue);if(!it.length)return'';const fl=FLEET[c]||0;const pc=fl?((it.length/fl)*100).toFixed(1):it.length;const ca=Math.round(it.reduce((s,r)=>s+r.overdue,0)/it.length);const cr=it.filter(r=>r.overdue>90).length;return`<div style="background:var(--bg);border-radius:8px;padding:12px 14px;border:1px solid var(--border);border-left:3px solid ${CC[c]}"><div class="flex-between" style="margin-bottom:3px"><span style="font-size:12px;font-weight:700;color:${CC[c]}">${esc(c)}</span><span class="mono" style="font-size:18px;font-weight:800">${fl?pc+'%':pc}</span></div><div class="mono" style="font-size:10px;color:var(--muted);margin-bottom:6px">${it.length} overdue${fl?' of '+fl:''}</div>${miniBar(it)}<div class="flex-between" style="margin-top:6px;font-size:10px;color:var(--muted)"><span>Avg: ${ca}d</span>${cr>0?`<span style="color:#B91C1C;font-weight:600">${cr} critical</span>`:''}</div></div>`}).join('');
  o+=`<div class="card"><div class="grotesk" style="font-size:12px;font-weight:700;margin-bottom:12px">Overdue by Asset Class</div><div class="grid grid-sm">${cc}</div></div>`;
  let rc=regions.map(r=>`<div class="region-card" style="border-color:var(--border);border-left-color:${RC[r.name]||'#666'}" onclick="state.tab='regions';state.openRegions={'${r.name}':true};render()"><div class="flex-between" style="margin-bottom:3px"><span style="font-size:12px;font-weight:700;color:${RC[r.name]||'#333'}">${esc(r.name)}</span><span class="mono" style="font-size:18px;font-weight:800">${r.count}</span></div>${miniBar(r.items)}<div class="flex-between" style="margin-top:6px;font-size:10px;color:var(--muted)"><span>Avg: ${r.avg}d</span>${r.noWO>0?`<span style="color:#D4A017;font-weight:600">${r.noWO} no WO</span>`:''}${r.crit>0?`<span style="color:#B91C1C;font-weight:600">${r.crit} crit</span>`:''}</div></div>`).join('');
  o+=`<div class="card"><div class="grotesk" style="font-size:12px;font-weight:700;margin-bottom:12px">Overdue by Region</div><div class="grid">${rc}</div></div>`;
  o+=`<div class="card"><div class="flex-between" style="margin-bottom:14px;flex-wrap:wrap;gap:8px"><span class="grotesk" style="font-size:12px;font-weight:700">All Overdue Assets</span><input class="search-input" type="text" placeholder="Search asset # or store..." value="${esc(state.search)}" oninput="state.search=this.value;render()"></div>${assetTableHTML(filterData())}<div class="flex-between" style="margin-top:12px;padding:8px 0;border-top:1px solid var(--border);font-size:11px;color:var(--muted)"><span>Showing ${filterData().length} of ${DATA.length} assets</span><span class="mono">Critical: &gt;90d · High: 61-90d · Medium: 31-60d · Low: 1-30d</span></div></div>`;
  return o;
}

function toggleRegion(name){state.openRegions[name]=!state.openRegions[name];render()}
function toggleStore(rn,sn){const key=rn+'|'+sn;state.openStores[key]=!state.openStores[key];render()}

function renderRegions(){
  const regions=getRegions();
  const nw=DATA.filter(r=>!r.hasOpenWO).length;const avg=Math.round(DATA.reduce((s,r)=>s+r.overdue,0)/DATA.length);
  let o=`<div class="kpi-strip">${statHTML("Total Overdue",DATA.length,`${(DATA.length/TOTAL_FLEET*100).toFixed(1)}% of fleet`,"#1B6B2A","Σ")}${statHTML("Regions",regions.length,"With overdue assets","#14522A","◆")}${statHTML("No Open WO",nw,"Needs WO created","#D4A017","⚠")}${statHTML("Avg Overdue",avg,`Worst: ${MAXOV}d`,"#C2410C","μ")}</div>`;

  regions.forEach(r=>{
    const isOpen=!!state.openRegions[r.name];
    const stores=getStoresForRegion(r.name);
    let storeContent='';
    if(isOpen){
      stores.forEach(s=>{
        const sk=r.name+'|'+s.name;
        const sOpen=!!state.openStores[sk];
        const statsRow=`<span class="mono" style="font-size:11px;display:flex;gap:12px;align-items:center"><span style="font-weight:700">${s.count} asset${s.count>1?'s':''}</span><span style="color:var(--muted)">Avg: ${s.avg}d</span>${s.crit>0?`<span style="color:#B91C1C;font-weight:600">${s.crit} crit</span>`:''}${s.noWO>0?`<span style="color:#D4A017;font-weight:600">${s.noWO} no WO</span>`:''}</span>`;
        storeContent+=`<div class="store-row" onclick="event.stopPropagation();toggleStore('${r.name}','${s.name.replace(/'/g,"\\'")}')"><div style="display:flex;align-items:center;gap:8px"><span class="accordion-arrow ${sOpen?'open':''}">▾</span><span style="font-weight:600;font-size:12px">${esc(s.name)}</span></div>${statsRow}</div>`;
        if(sOpen){
          storeContent+=`<div class="store-assets">${assetTableHTML(s.items)}</div>`;
        }
      });
    }
    const regionStats=`<span class="mono" style="font-size:11px;display:flex;gap:14px;align-items:center"><span style="font-weight:800;font-size:16px">${r.count}</span><span style="color:var(--muted)">Avg: ${r.avg}d</span>${r.crit>0?`<span style="color:#B91C1C;font-weight:600">${r.crit} crit</span>`:''}${r.noWO>0?`<span style="color:#D4A017;font-weight:600">${r.noWO} no WO</span>`:''}<span style="color:var(--muted)">${stores.length} store${stores.length>1?'s':''}</span></span>`;
    o+=`<div class="accordion"><div class="accordion-head" onclick="toggleRegion('${r.name}')"><div style="display:flex;align-items:center;gap:10px"><span class="accordion-arrow ${isOpen?'open':''}">▾</span>${dot(RC[r.name]||'#666',10)}<span class="grotesk" style="font-size:14px;font-weight:700;color:${RC[r.name]||'var(--fg)'}">${esc(r.name)}</span></div>${regionStats}</div>${isOpen?`<div class="accordion-body">${storeContent}</div>`:''}</div>`;
  });
  return o;
}

function handleSort(col){if(state.sortCol===col)state.sortDir=state.sortDir==="desc"?"asc":"desc";else{state.sortCol=col;state.sortDir="desc"}render()}
function switchTab(tab){state.tab=tab;state.search="";state.sortCol="overdue";state.sortDir="desc";if(tab!=="regions"){state.openRegions={};state.openStores={}}render()}

function render(){
  const now=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const tabs=[{id:"summary",l:"Summary"},{id:"regions",l:"Region / Store"}];
  let tb=tabs.map(t=>`<button class="tab-btn ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${t.l}</button>`).join('');
  let content=state.tab==="summary"?renderSummary():renderRegions();
  document.getElementById('app').innerHTML=`
    <div class="header-bar">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span class="live-dot"></span>
          <span class="mono" style="font-size:11px;color:var(--yellow);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">OVERDUE ASSETS — LIVE</span>
        </div>
        <h1>PM Compliance Dashboard</h1>
        <p class="sub">McCoy's Building Supply · Fleet Preventive Maintenance · ${DATA.length} overdue of ${TOTAL_FLEET.toLocaleString()} assets (${(DATA.length/TOTAL_FLEET*100).toFixed(1)}%)</p>
      </div>
      <div class="date"><div>Report generated</div><strong>${now}</strong></div>
    </div>
    <div class="accent-stripe"></div>
    <div class="tab-bar">${tb}</div>
    ${content}`;
}
render();
</script>
</body>
</html>
